services:
  ml:
    build:
      context: .
      dockerfile: Ml_model/Dockerfile
    ports:
      - "5001:5001"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace-with-a-long-random-secret-for-local-dev}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:5000,http://localhost:5000}
      ML_API_URL: ${ML_API_URL:-http://ml:5001/analyze-report}
      ML_SYMPTOM_API_URL: ${ML_SYMPTOM_API_URL:-http://ml:5001/analyze-symptoms}
    ports:
      - "5000:5000"
    depends_on:
      - ml
