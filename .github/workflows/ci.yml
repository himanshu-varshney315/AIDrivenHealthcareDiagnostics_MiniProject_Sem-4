name: CI

on:
  push:
  pull_request:

jobs:
  backend-and-ml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -r Ml_model/requirements.txt
          python -m pip install ruff

      - name: Lint Python
        run: python -m ruff check backend Ml_model

      - name: Run backend tests
        env:
          JWT_SECRET_KEY: ci-test-secret-with-at-least-32-bytes
        run: python -m unittest discover -s backend/tests

      - name: Run ML smoke tests
        run: python -m unittest discover -s Ml_model/tests

  flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        working-directory: frontend_flutter
        run: flutter pub get

      - name: Analyze Flutter
        working-directory: frontend_flutter
        run: flutter analyze

      - name: Test Flutter
        working-directory: frontend_flutter
        run: flutter test
