services:
  - type: web
    name: ayuva-ml
    runtime: docker
    plan: free
    dockerfilePath: ./Ml_model/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit

  - type: postgres
    name: ayuva-db
    plan: free
    # Note: Render free Postgres has 750MB limit, upgrade for more storage

  - type: web
    name: ayuva-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MAX_UPLOAD_BYTES
        value: "10485760"
      - key: DATABASE_URL
        fromDatabase:
          name: ayuva-db
          property: connectionString
      - key: ML_API_URL
        value: https://ayuva-ml.onrender.com/analyze-report
      - key: ML_SYMPTOM_API_URL
        value: https://ayuva-ml.onrender.com/analyze-symptoms
      - key: ML_REQUEST_TIMEOUT_SECONDS
        value: "120"
